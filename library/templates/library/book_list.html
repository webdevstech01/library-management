{% extends "library/base.html" %} {% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
  <h1>Books</h1>

  <a href="/admin/library/book/add/" class="btn btn-primary"> Add Book </a>
</div>

<table class="table table-striped">
  <thead>
    <tr>
      <th>Title</th>
      <th>Author</th>
      <th>Category</th>
      <th>Available</th>
    </tr>
  </thead>

  <tbody>
    {% for book in books %}

    <tr>
      <td>{{ book.title }}</td>
      <td>{{ book.author }}</td>
      <td>{{ book.category }}</td>
      <td>{{ book.available_copies }}</td>
    </tr>

    {% empty %}

    <tr>
      <td colspan="4" class="text-center">No books available.</td>
    </tr>

    {% endfor %}
  </tbody>
</table>

{% endblock %}
