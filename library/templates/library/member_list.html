{% extends "library/base.html" %} {% block content %}

<h1>Members</h1>

<table class="table table-striped">
  <thead>
    <tr>
      <th>First Name</th>
      <th>Last Name</th>
      <th>Email</th>
      <th>Phone</th>
    </tr>
  </thead>

  <tbody>
    {% for member in members %}

    <tr>
      <td>{{ member.first_name }}</td>
      <td>{{ member.last_name }}</td>
      <td>{{ member.email }}</td>
      <td>{{ member.phone }}</td>
    </tr>

    {% empty %}

    <tr>
      <td colspan="4" class="text-center">No members found.</td>
    </tr>

    {% endfor %}
  </tbody>
</table>

{% endblock %}
