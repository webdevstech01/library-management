<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library Management</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand" href="{% url 'home' %}"> Library </a>

        <div class="d-flex gap-3">
          <a class="nav-link text-light" href="{% url 'home' %}">Home</a>
          <a class="nav-link text-light" href="{% url 'books' %}">Books</a>
          <a class="nav-link text-light" href="{% url 'members' %}">Members</a>
          <a class="nav-link text-light" href="{% url 'loans' %}">Loans</a>

          {% if user.is_authenticated %}

          <span class="navbar-text me-3"> Hello {{ user.username }} </span>

          <form action="{% url 'logout' %}" method="post" class="d-inline">
            {% csrf_token %}

            <button type="submit" class="btn btn-outline-light">Logout</button>
          </form>

          {% else %}

          <a class="btn btn-outline-light" href="{% url 'login' %}"> Login </a>

          {% endif %}
        </div>
      </div>
    </nav>

    <div class="container mt-4">{% block content %} {% endblock %}</div>
  </body>
</html>
